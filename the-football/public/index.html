<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <title>The Gallery</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    .main-tabs {
      padding: 16px 16px 0;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    #gallery-section { padding-bottom: 80px; }
    #upload-section { padding: 20px 16px 80px; max-width: 600px; margin: 0 auto; }

    .selection-bar {
      position: sticky;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 50;
    }

    .filter-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .filter-chip {
      padding: 6px 14px;
      border-radius: 100px;
      font-size: 0.8rem;
      font-weight: 500;
      background: var(--surface-3);
      color: var(--text-muted);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all var(--transition);
    }
    .filter-chip:hover { color: var(--text); border-color: var(--border-hover); }
    .filter-chip.active { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }

    @media (max-width: 480px) {
      .gallery-count { display: none; }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <div class="site-name" id="siteName">The <span>Gallery</span></div>
      <nav class="nav">
        <a href="#gallery" class="nav-link active" id="navGallery">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          Gallery
        </a>
        <a href="#upload" class="nav-link" id="navUpload">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
          Upload
        </a>
        <a href="/slideshow" class="nav-link">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="15" rx="2"/><polyline points="17 2 12 7 7 2"/></svg>
          <span class="hidden-xs">Slideshow</span>
        </a>
        <a href="/admin" class="nav-link">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M6 20v-2a6 6 0 0 1 12 0v2"/></svg>
          <span class="hidden-xs">Admin</span>
        </a>
      </nav>
    </div>
  </header>

  <!-- Gallery Tab -->
  <div id="gallery-section">
    <div class="gallery-controls">
      <div class="filter-bar">
        <button class="filter-chip active" data-filter="all">All</button>
        <button class="filter-chip" data-filter="image">Photos</button>
        <button class="filter-chip" data-filter="video">Videos</button>
      </div>
      <div class="ml-auto flex items-center gap-2">
        <span class="text-muted text-sm gallery-count" id="galleryCount"></span>
        <button class="btn btn-ghost btn-sm" id="selectModeBtn">Select</button>
        <button class="btn btn-primary btn-sm hidden" id="downloadAllBtn">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="8 17 12 21 16 17"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.88 18.09A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.29"/></svg>
          Download All
        </button>
      </div>
    </div>

    <div class="gallery-grid" id="galleryGrid"></div>
    <div class="pagination hidden" id="pagination"></div>

    <!-- Selection bar (shown in select mode) -->
    <div class="selection-bar hidden" id="selectionBar">
      <span class="text-sm text-muted" id="selectedCount">0 selected</span>
      <button class="btn btn-ghost btn-sm" id="selectAllBtn">Select All</button>
      <button class="btn btn-ghost btn-sm" id="clearSelectionBtn">Clear</button>
      <button class="btn btn-primary btn-sm ml-auto" id="downloadSelectedBtn" disabled>
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="8 17 12 21 16 17"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.88 18.09A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.29"/></svg>
        Download (<span id="selCount">0</span>)
      </button>
      <button class="btn btn-ghost btn-sm" id="cancelSelectBtn">Cancel</button>
    </div>
  </div>

  <!-- Upload Tab (hidden initially) -->
  <div id="upload-section" class="hidden">
    <div class="upload-area" id="uploadArea">
      <div style="pointer-events:none">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" style="margin:0 auto 16px;color:var(--text-dim)"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
        <div class="upload-title">Tap to choose photos & videos</div>
        <div class="upload-sub" style="margin-top:6px">or drag and drop here</div>
        <div class="upload-sub" style="margin-top:4px">JPEG, PNG, GIF, WebP, HEIC, MP4, MOV, WebM and more</div>
      </div>
      <input type="file" id="fileInput" multiple accept="image/*,video/*,.heic,.heif,.mkv,.avi" style="display:none">
    </div>

    <div class="upload-queue hidden" id="uploadQueue"></div>

    <div id="uploadSuccess" class="hidden" style="text-align:center;padding:32px 0">
      <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="var(--success)" stroke-width="1.5" style="margin:0 auto 12px"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      <h3 style="font-size:1.1rem;margin-bottom:8px">Upload Complete!</h3>
      <p class="text-muted text-sm">Your files have been submitted for review. They'll appear in the gallery once approved.</p>
      <button class="btn btn-ghost" style="margin-top:20px" id="uploadMoreBtn">Upload More</button>
    </div>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <div class="lightbox-header">
      <div class="lightbox-title" id="lightboxTitle"></div>
      <div class="lightbox-actions">
        <a class="btn btn-ghost btn-sm" id="lightboxDownload" download>
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="8 17 12 21 16 17"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.88 18.09A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.29"/></svg>
          Download
        </a>
        <button class="btn btn-ghost btn-sm" id="lightboxClose">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    </div>

    <div class="lightbox-body" id="lightboxBody">
      <div id="lightboxContent"></div>
    </div>

    <button class="lightbox-nav prev" id="lightboxPrev">
      <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="lightbox-nav next" id="lightboxNext">
      <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
    </button>

    <div class="lightbox-counter" id="lightboxCounter"></div>
  </div>

  <div id="toastContainer"></div>

  <script src="/js/app.js"></script>
  <script src="/js/gallery.js"></script>
  <script src="/js/upload.js"></script>
</body>
</html>
