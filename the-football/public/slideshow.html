<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <title>Slideshow</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    body { background: #000; overflow: hidden; }

    #app {
      width: 100dvw;
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      background: #000;
    }

    #mediaContainer {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    #mediaContainer img,
    #mediaContainer video {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* Top bar */
    #topBar {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 16px 20px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 20;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    #topBar .site-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: rgba(255,255,255,0.8);
    }

    #topBar .counter {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.5);
    }

    /* Bottom controls */
    #bottomBar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 20px;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 20;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    #app:hover #topBar,
    #app:hover #bottomBar,
    #app.show-controls #topBar,
    #app.show-controls #bottomBar { opacity: 1; }

    /* Nav arrows */
    .nav-arrow {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.4s ease, background 0.2s ease;
    }

    .nav-arrow:hover { background: rgba(255,255,255,0.18); }
    #app:hover .nav-arrow,
    #app.show-controls .nav-arrow { opacity: 1; }
    .nav-arrow.disabled { opacity: 0.2 !important; cursor: default; pointer-events: none; }
    #prevBtn { left: 16px; }
    #nextBtn { right: 16px; }

    /* Control buttons in bottom bar */
    .ctrl-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s ease;
      font-size: 0.75rem;
    }
    .ctrl-btn:hover { background: rgba(255,255,255,0.2); }
    .ctrl-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* Progress ring */
    #progressRing {
      position: relative;
      width: 44px;
      height: 44px;
    }
    #progressRing svg {
      position: absolute;
      inset: 0;
      transform: rotate(-90deg);
    }
    #progressRing .ring-bg { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 2; }
    #progressRing .ring-fg {
      fill: none;
      stroke: var(--accent);
      stroke-width: 2;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.1s linear;
    }
    #progressRing .ring-icon {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.85);
    }

    /* Speed selector */
    #speedControl {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 22px;
      padding: 6px 14px;
    }

    #speedControl label {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.5);
      white-space: nowrap;
    }

    #speedSelect {
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.85);
      font-size: 0.8rem;
      font: inherit;
      cursor: pointer;
      outline: none;
      padding: 0;
    }

    #speedSelect option { background: #1a1a1a; color: #f0f0f0; }

    /* Slide transition */
    #mediaContainer { transition: opacity 0.3s ease; }
    #mediaContainer.fade-out { opacity: 0; }
    #mediaContainer.fade-in { opacity: 1; }

    /* Loading / empty */
    #loadingMsg {
      color: rgba(255,255,255,0.4);
      font-size: 1rem;
      text-align: center;
    }

    /* Home link */
    #homeLink {
      color: rgba(255,255,255,0.6);
      font-size: 0.8rem;
      text-decoration: none;
      padding: 6px 12px;
      border-radius: var(--radius);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      transition: background 0.2s;
    }
    #homeLink:hover { background: rgba(255,255,255,0.15); color: #fff; }
  </style>
</head>
<body>
  <div id="app">
    <!-- Top info bar -->
    <div id="topBar">
      <div class="site-title" id="slideSiteName">The Gallery</div>
      <div class="counter" id="slideCounter"></div>
    </div>

    <!-- Media display -->
    <div id="mediaContainer">
      <div id="loadingMsg">
        <div class="spinner" style="border-color:rgba(255,255,255,0.1);border-top-color:rgba(255,255,255,0.4);margin:0 auto 12px"></div>
        Loading…
      </div>
    </div>

    <!-- Prev / Next arrows -->
    <button class="nav-arrow" id="prevBtn" aria-label="Previous">
      <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="nav-arrow" id="nextBtn" aria-label="Next">
      <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
    </button>

    <!-- Bottom controls -->
    <div id="bottomBar">
      <!-- Progress ring / play-pause -->
      <div id="progressRing">
        <svg viewBox="0 0 44 44" width="44" height="44">
          <circle class="ring-bg" cx="22" cy="22" r="19"/>
          <circle class="ring-fg" id="ringFg" cx="22" cy="22" r="19"
                  stroke-dasharray="119.4" stroke-dashoffset="119.4"/>
        </svg>
        <button class="ring-icon" id="playPauseBtn" aria-label="Play/Pause">
          <svg id="playPauseIcon" width="18" height="18" fill="currentColor" viewBox="0 0 24 24">
            <rect x="6" y="4" width="4" height="16"/>
            <rect x="14" y="4" width="4" height="16"/>
          </svg>
        </button>
      </div>

      <!-- Speed -->
      <div id="speedControl">
        <label for="speedSelect">Speed</label>
        <select id="speedSelect">
          <option value="2000">2s</option>
          <option value="3000">3s</option>
          <option value="5000" selected>5s</option>
          <option value="8000">8s</option>
          <option value="10000">10s</option>
          <option value="15000">15s</option>
          <option value="30000">30s</option>
        </select>
      </div>

      <!-- Fullscreen -->
      <button class="ctrl-btn" id="fullscreenBtn" aria-label="Fullscreen">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <polyline points="15 3 21 3 21 9"/>
          <polyline points="9 21 3 21 3 15"/>
          <line x1="21" y1="3" x2="14" y2="10"/>
          <line x1="3" y1="21" x2="10" y2="14"/>
        </svg>
      </button>

      <!-- Home -->
      <a href="/" id="homeLink">← Gallery</a>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/slideshow.js"></script>
</body>
</html>
