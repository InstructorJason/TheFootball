<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#111111">
  <title>Admin — The Gallery</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    /* Media viewer modal */
    #mediaModal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }
    #mediaModal.open { opacity: 1; pointer-events: all; }
    #mediaModal img, #mediaModal video {
      max-width: 90vw;
      max-height: 80vh;
      object-fit: contain;
      border-radius: var(--radius);
    }
    #mediaModalClose {
      position: absolute;
      top: 16px;
      right: 16px;
      color: rgba(255,255,255,0.7);
    }

    .exif-details {
      background: var(--surface-3);
      border-radius: var(--radius);
      padding: 10px;
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 6px;
      display: none;
    }
    .exif-details.show { display: block; }
    .exif-toggle { font-size: 0.72rem; color: var(--accent); cursor: pointer; }
    .exif-toggle:hover { color: var(--accent-hover); }

    .queue-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
    }

    .queue-header h2 {
      font-size: 1rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* Password change section */
    .change-pw-section {
      max-width: 400px;
    }
  </style>
</head>
<body>

  <!-- LOGIN PAGE -->
  <div id="loginPage" class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <h1>The <span>Gallery</span></h1>
        <p>Admin Portal</p>
      </div>
      <form id="loginForm">
        <div style="display:flex;flex-direction:column;gap:16px">
          <div class="form-group">
            <label class="form-label">Username</label>
            <input type="text" class="form-control" id="loginUsername" autocomplete="username" required>
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" id="loginPassword" autocomplete="current-password" required>
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:4px" id="loginBtn">
            Sign In
          </button>
          <div id="loginError" class="hidden" style="color:var(--danger);font-size:.85rem;text-align:center"></div>
        </div>
      </form>
    </div>
  </div>

  <!-- ADMIN DASHBOARD (hidden until logged in) -->
  <div id="adminApp" class="admin-layout hidden">

    <!-- Sidebar overlay (mobile) -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Sidebar -->
    <aside class="admin-sidebar" id="adminSidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">The <span>Gallery</span></div>
        <div style="font-size:0.75rem;color:var(--text-muted);margin-top:2px">Admin Dashboard</div>
      </div>

      <nav class="sidebar-nav">
        <a href="#" class="sidebar-link active" data-section="pending">
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>
          Approval Queue
          <span class="badge hidden" id="pendingBadge">0</span>
        </a>
        <a href="#" class="sidebar-link" data-section="cleared">
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          Cleared Media
        </a>
        <a href="#" class="sidebar-link" data-section="rejected">
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
          Rejected
        </a>
        <div style="height:1px;background:var(--border);margin:8px 4px"></div>
        <a href="#" class="sidebar-link" data-section="users">
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Admin Users
        </a>
        <a href="#" class="sidebar-link" data-section="settings">
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          Settings
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="sidebar-user">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M6 20v-2a6 6 0 0 1 12 0v2"/></svg>
          <span id="sidebarUsername">Admin</span>
        </div>
        <a href="/" class="sidebar-link" style="font-size:0.8rem">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          View Gallery
        </a>
        <button class="sidebar-link" id="logoutBtn" style="text-align:left;width:100%;color:var(--danger)">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Sign Out
        </button>
      </div>
    </aside>

    <!-- Main content -->
    <div class="admin-main">
      <div class="admin-topbar">
        <button class="btn-icon" id="sidebarToggle" style="display:none">
          <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h1 id="sectionTitle">Approval Queue</h1>
        <div id="topbarActions" style="margin-left:auto;display:flex;gap:8px"></div>
      </div>

      <div class="admin-content" id="adminContent">
        <div class="loading-overlay"><div class="spinner"></div></div>
      </div>
    </div>
  </div>

  <!-- Media preview modal -->
  <div id="mediaModal">
    <button class="btn-icon" id="mediaModalClose" style="position:absolute;top:16px;right:16px;color:#fff">
      <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div id="mediaModalContent"></div>
  </div>

  <div id="toastContainer"></div>

  <script src="/js/app.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
